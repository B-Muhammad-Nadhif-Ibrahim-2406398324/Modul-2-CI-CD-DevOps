name: PMD Analysis

on:
  push:

jobs:
  pmd-scan:
    name: Run PMD Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run PMD via Gradle
        run: ./gradlew pmdMain pmdTest